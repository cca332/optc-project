data:
  optc:
    data_dir: "data/raw"  # Raw JSONL files
    cache_dir: "data/cache"  # Preprocessed cache (Data Disk)
    
    # Dataset Paths & Prefixes
    # Train: 3 files (17-19day)
    train_path: "data/AIA-51-75.ecar-last17-18day.json.gz,data/AIA-51-75.ecar-last 18-19day.json.gz,data/AIA-51-75.ecar-last 19day.json.gz"
    train_prefix: "train"
    
    # Validation: Use Test Set (25day) for tuning
    val_path: "data/AIA-51-75.ecar-last25day.json.gz"
    val_prefix: "test"
    
    # Test: 25day
    test_path: "data/AIA-51-75.ecar-last25day.json.gz"
    test_prefix: "test"

    max_seq_len: 128
    
    # Time Filtering (Optional, set to null to read all)
    # Example for 25day slice
    time_range: null
    #   start: "2019-09-25T09:00:00-04:00"
    #   end: "2019-09-25T15:00:00-04:00"
      
    # Windowing
    window_minutes: 15
    max_events_per_window: 20000
    chunk_size: 100 # Optimized for IO
    
    # Host Filter (Optional, list of hostnames)
    host_filter: null 
    #  - "SysClient0052.systemia.com"
    
    # View Mapping (Override default)
    view_mapping:
      network: ["FLOW"]
      file: ["FILE", "REGISTRY"]
      process: ["PROCESS", "THREAD", "MODULE", "SHELL", "TASK", "USER_SESSION"]

training:
  federated_learning: false # [SWITCH] Toggle between Centralized and Federated
  epochs: 1
  batch_size: 8
  learning_rate: 1.0e-5 # Step 1 LR (LoRA fine-tuning)
  output_dir: "results4"
  seed: 42
  num_workers: 0 # [OPTIMIZED] DataLoader workers (set to 0 for debugging)
  
  # Teacher Pretraining
  teacher:
    epochs: 1
    lr: 1.0e-5
    temp: 0.1
    
  # Federated Client Training
  client:
    local_epochs: 1
    batch_size: 8
    lr: 1.0e-4
    weight_decay: 1.0e-4
    lambda_stats: 50.0
    lambda_infonce: 1.0
    temp_params:
      a: 2.0
      b: 1.0
      min_tau: 0.05
      max_tau: 0.2

model:
  # Quality
  quality_softmax_temp: 0.5
  
  # Step 1 Configuration
  slot_seconds: 60
  num_hash_buckets: 50
  target_dim: 32
  router_hidden_dims: [64]
  num_subspaces: 4
  # LoRA Settings (for Router/Fusion)
  gate_gamma: 0.5
  gate_beta: 5.0
  max_vocab_types: 500
  
  # Step 2 & Teacher
  subspace_dim: 16
  behavior_dim: 128
  
  # Teacher Pretraining (Phase 1)
  teacher:
    epochs: 1
    lr: 1.0e-4
    temp: 0.1
    augment_mask_p: 0.2
    augment_noise_std: 0.01
  
  # LoRA
  lora_rank: 4
  lora_alpha: 8
  
  # Step 3 Detector
  drift_lr: 0.01
  threshold_quantile: 0.90
  
  # SCD Loss Weights
  scd_loss:
    lambda_d: 1.0
    lambda_r: 1.0
    lambda_v: 25.0
    gamma: 5.0
    
  # ATC Parameters (Adaptive Threshold Correction)
  atc:
    alpha_conf: 0.0
    alpha_unc: 0.0
    alpha_risk: 0.0
    
  # View Sensitivities (for Risk calculation)
  view_sensitivities:
    process: 1.0
    file: 1.0
    network: 1.0
  
  # DP Settings
  feature_dp:
    enabled: false
    clip_C: 10.0
    noise_sigma: 0.01
    
  grad_dp:
    enabled: false
    base_clip_C0: 1.0
    importance_alpha: 0.0
    noise_sigma0: 0.0
