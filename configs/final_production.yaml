data:
  optc:
    cache_dir: /root/optc-project/experiments/result1/cache
    chunk_size: 500
    data_dir: /root/optc-project
    host_filter: null
    max_events_per_window: null
    max_seq_len: 128
    test_path: /root/optc-project/AIA-51-75.ecar-last25day.json.gz
    test_prefix: test
    time_range: null
    train_path: /root/optc-project/AIA-51-75.ecar-last17-18day.json.gz
    train_prefix: train
    val_path: /root/optc-project/AIA-51-75.ecar-last17-18day.json.gz
    val_prefix: val
    view_mapping:
      file:
      - FILE
      - REGISTRY
      network:
      - FLOW
      process:
      - PROCESS
      - THREAD
      - MODULE
      - SHELL
      - TASK
      - USER_SESSION
      - HOST
    window_minutes: 5
model:
  atc:
    alpha_conf: 0.5
    alpha_risk: 0.5
    alpha_unc: 0.5
  behavior_dim: 128
  drift_lr: 0.01
  feature_dp:
    clip_C: 10.0
    enabled: true
    noise_sigma: 0.01
  gate_beta: 5.0
  gate_gamma: 0.5
  interaction_enabled: true
  grad_dp:
    base_clip_C0: 1.0
    enabled: true
    importance_alpha: 0.5
    noise_sigma0: 0.05
  lora_alpha: 8
  lora_rank: 4
  max_vocab_types: 500
  num_hash_buckets: 50
  num_subspaces: 4
  quality_softmax_temp: 0.5
  router_hidden_dims:
  - 64
  scd_loss:
    gamma: 10.0
    lambda_d: 10.0
    lambda_r: 10.0
    lambda_v: 1.0
  quantile: 0.90
  slot_seconds: 30
  subspace_dim: 16
  target_dim: 32
  teacher:
    augment_mask_p: 0.2
    augment_noise_std: 0.01
    epochs: 10
    lr: 0.0001
    temp: 0.1
  threshold_quantile: 0.99
  view_sensitivities:
    file: 1.5
    network: 1.0
    process: 2.0
training:
  batch_size: 128
  client:
    batch_size: 256
    lambda_infonce: 10.0
    lambda_stats: 50.0
    local_epochs: 5
    lr: 0.0005
    temp_params:
      a: 2.0
      b: 1.0
      max_tau: 0.2
      min_tau: 0.05
    weight_decay: 0.0001
  epochs: 50
  federated_learning: true
  learning_rate: 0.001
  num_workers: 0
  output_dir: /root/optc-project/experiments/result1
  seed: 42
  teacher:
    epochs: 5
    lr: 1.0e-05
    temp: 0.1
