event_method:
  cache:
    max_events: 0
    samples_per_shard: 32

  model:
    event_dim: 32
    num_subspaces: 4
    max_seq_len: 128
    detector_layers: 2
    detector_heads: 4
    mask_ratio: 0.2
    topk_fraction: 0.1
    inference_mask_batch: 16

  training:
    batch_size: 2
    epochs: 1
    lr: 1.0e-4
    threshold_quantile: 0.99

  federated:
    rounds: 3
    client_fraction: 0.3
    min_clients: 5
    local_epochs: 1
    lr: 1.0e-4
    server_lr: 1.0
    enable_privacy: true
    dp_clip: 1.0
    dp_noise: 0.05
    secure_agg_enabled: true
    secure_agg_protocol: pairwise_masking
    grad_dp:
      enabled: true
      base_clip_C0: 1.0
      importance_alpha: 0.5
      noise_sigma0: 0.05
